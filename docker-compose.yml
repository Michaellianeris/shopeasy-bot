version: "3.9"

services:
  shopeasy-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: shopeasy-bot:latest
    container_name: shopeasy-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.shopeasy.service=customer-service-bot"
      - "com.shopeasy.version=1.0.0"
